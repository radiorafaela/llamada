<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Corresponsal - Broadcast</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="reporter-body">

    <div class="reporter-container glass-panel">
        <div class="reporter-header">
            <h2>Corresponsal</h2>
        </div>

        <div class="status-circle" id="onAirIndicator">
            <span class="icon">🎙️</span>
        </div>

        <h1 id="connectionStatus" class="status-text warning">Conectando...</h1>
        <p class="subtitle" id="connectionDetail">Buscando central de Radio</p>

        <div class="return-control">
            <label>Escuchar Retorno (Estudio):</label>
            <input type="range" id="returnVolume" min="0" max="1" step="0.1" value="0.8">
            <audio id="returnAudio" autoplay></audio>
        </div>

        <div class="mic-toggle">
            <button id="toggleMicBtn" class="big-btn success">MI MICRÓFONO: ABIERTO</button>
        </div>
    </div>

    <!-- Usamos PeerJS y nuestra logica -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="js/reporter.js"></script>
</body>

</html>
