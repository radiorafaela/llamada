<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Console - Broadcast</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="master-body">

    <!-- LOGIN OVERLAY - Se oculta al autenticar -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-box glass-panel">
            <h2>🎛️ Consola Master</h2>
            <p>Ingresá la contraseña de sesión para iniciar.</p>
            <input type="password" id="masterPassword" class="glass-input login-input"
                placeholder="Contraseña de sesión..." autofocus>
            <button id="masterLoginBtn" class="big-btn success">INICIAR MASTER</button>
            <p class="login-hint">Esta contraseña debe coincidir con la que usen los corresponsales.</p>
        </div>
    </div>

    <header class="master-header glass-panel" style="display:none;" id="masterHeader">
        <div class="header-left">
            <h1>🎛️ Radio Master Console</h1>
            <span id="master-status" class="status-badge warning">Conectando Servidor...</span>
        </div>
        <div class="header-right">
            <div class="device-selector">
                <label for="audioSource">Micrófono (Retorno):</label>
                <select id="audioSource" class="glass-input">
                    <option value="">Cargando dispositivos...</option>
                </select>
            </div>
            <button id="toggleReturnBtn" class="control-btn live-btn">Retorno: EN VIVO (AL AIRE)</button>
            <button id="logoutBtn" class="control-btn" style="background:#333;">Cerrar Sesión</button>
        </div>
    </header>

    <main class="dashboard" style="display:none;" id="masterMain">
        <!-- Tarjeta del Retorno (El audio de la Radio) -->
        <section class="master-audio-section glass-panel">
            <div class="vu-meter-container large">
                <canvas id="masterVuMeter" width="300" height="30"></canvas>
            </div>
            <p class="section-hint">Nivel de Audio (Retorno hacia los móviles)</p>
        </section>

        <!-- Grid de Corresponsales -->
        <div class="reporters-grid" id="reportersGrid"></div>
    </main>

    <!-- Usamos PeerJS y nuestra logica -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="js/master.js"></script>
</body>

</html>
